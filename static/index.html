<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samvidhaan AI - Legal Document Auditor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
        }

        header p {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .upload-box {
            background: white;
            border: 2px dashed #1a1a2e;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
        }

        .upload-box h2 {
            margin-bottom: 10px;
            color: #1a1a2e;
        }

        .upload-box p {
            color: #888;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin-bottom: 20px;
        }

        button {
            background-color: #1a1a2e;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #16213e;
        }

        #loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #888;
        }

        #report {
            display: none;
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
        }

        #report h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
        }

        .risk-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .risk-High { background-color: #ffe0e0; color: #c0392b; }
        .risk-Medium { background-color: #fff3cd; color: #856404; }
        .risk-Low { background-color: #d4edda; color: #155724; }

        .summary {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .issue-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .issue-card h4 {
            color: #c0392b;
            margin-bottom: 8px;
        }

        .issue-card p {
            font-size: 14px;
            margin-bottom: 5px;
            line-height: 1.5;
        }

        .issue-card .fix {
            background: #e8f5e9;
            padding: 8px;
            border-radius: 5px;
            margin-top: 8px;
            font-size: 13px;
            color: #2e7d32;
        }

        .label {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>⚖️ Samvidhaan AI</h1>
    <p>Indian Legal Document Auditor — Upload your document, get instant feedback</p>
</header>

<div class="container">
    <div class="upload-box">
        <h2>Upload Your Legal Document</h2>
        <p>Supports PDF format — Rent Agreement, RTI, Vendor Contract, Consumer Complaint</p>
        <input type="file" id="fileInput" accept=".pdf">
        <br>
        <button onclick="uploadFile()">Audit My Document</button>
    </div>

    <div id="loading">
        <p>⏳ Analyzing your document... This may take a few seconds.</p>
    </div>

    <div id="report">
        <h2>📋 Audit Report</h2>
        <div id="reportContent"></div>
    </div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];

        if (!file) {
            alert('Please select a PDF file first');
            return;
        }

        // Show loading
        document.getElementById('loading').style.display = 'block';
        document.getElementById('report').style.display = 'none';

        // Create form data
        const formData = new FormData();
        formData.append('file', file);

        try {
            // Send to API
            const response = await fetch('http://127.0.0.1:8000/audit', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            const report = data.report;

            // Hide loading
            document.getElementById('loading').style.display = 'none';

            // Build report HTML
            let html = '';

            // Risk badge
            html += `<span class="risk-badge risk-${report.overall_risk}">
                        Risk: ${report.overall_risk}
                     </span>`;

            // Summary
            html += `<div class="summary">${report.summary}</div>`;

            // Issues
            html += `<h3 style="margin-bottom:15px;">Issues Found (${report.issues.length})</h3>`;

            report.issues.forEach(issue => {
                html += `
                    <div class="issue-card">
                        <h4>⚠️ ${issue.issue}</h4>
                        <p><span class="label">Why it matters:</span> ${issue.why_it_matters}</p>
                        <div class="fix">✅ <strong>Fix:</strong> ${issue.how_to_fix}</div>
                    </div>
                `;
            });

            document.getElementById('reportContent').innerHTML = html;
            document.getElementById('report').style.display = 'block';

        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            alert('Error: Could not connect to server. Make sure the backend is running.');
        }
    }
</script>

</body>
</html>
